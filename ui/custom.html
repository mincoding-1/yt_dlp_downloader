<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --surface: #ffffff;
      --surface-2: #f0f3f6;
      --line: #d7dde3;
      --line-strong: #b8c1cc;
      --text: #1d252d;
      --muted: #66727f;
      --accent: #16746b;
      --accent-strong: #0f5f58;
      --danger: #b73535;
      --warning: #946200;
      --ok: #237143;
      --shadow: 0 1px 2px rgba(16, 24, 40, 0.08);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.4;
    }

    button, input, select {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(280px, 0.75fr);
      gap: 12px;
      padding: 12px;
      min-height: 100vh;
    }

    .column {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 0;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
    }

    .panel-title {
      margin: 0;
      font-size: 14px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .panel-body {
      padding: 12px;
    }

    .url-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto auto;
      gap: 8px;
      align-items: center;
    }

    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
      min-width: 0;
    }

    input[type="url"],
    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      min-height: 34px;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      padding: 6px 8px;
      color: var(--text);
      background: #fff;
    }

    input:focus,
    select:focus {
      outline: 2px solid rgba(22, 116, 107, 0.18);
      border-color: var(--accent);
    }

    .btn {
      min-height: 34px;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      padding: 6px 10px;
      background: #fff;
      color: var(--text);
      cursor: pointer;
      white-space: nowrap;
    }

    .btn:hover { border-color: var(--accent); }
    .btn:disabled { cursor: not-allowed; opacity: 0.55; }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.primary:hover { background: var(--accent-strong); border-color: var(--accent-strong); }
    .btn.danger { border-color: rgba(183, 53, 53, 0.45); color: var(--danger); }
    .btn.small { min-height: 28px; padding: 4px 8px; font-size: 12px; }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .preset-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 8px;
      align-items: end;
      margin-bottom: 10px;
    }

    .advanced {
      margin-top: 10px;
      border-top: 1px solid var(--line);
      padding-top: 10px;
    }

    .advanced summary {
      cursor: pointer;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 10px;
    }

    .summary {
      display: grid;
      grid-template-columns: 96px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }

    .thumb {
      width: 96px;
      aspect-ratio: 16 / 9;
      border-radius: 6px;
      background: var(--surface-2);
      border: 1px solid var(--line);
      object-fit: cover;
    }

    .thumb.placeholder {
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 12px;
    }

    .title {
      margin: 0 0 6px;
      font-size: 15px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 2px 7px;
      border-radius: 999px;
      background: var(--surface-2);
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .badge.ok { color: var(--ok); background: rgba(35, 113, 67, 0.1); }
    .badge.warn { color: var(--warning); background: rgba(148, 98, 0, 0.1); }
    .badge.err { color: var(--danger); background: rgba(183, 53, 53, 0.1); }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 6px;
      max-height: 280px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      background: #fff;
    }

    th, td {
      padding: 7px 8px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
      overflow-wrap: anywhere;
    }

    th {
      position: sticky;
      top: 0;
      background: #f9fafb;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      z-index: 1;
    }

    tr:last-child td { border-bottom: 0; }
    .check-col { width: 38px; }
    .idx-col { width: 54px; color: var(--muted); }
    .dur-col { width: 82px; color: var(--muted); }

    .job-list {
      display: grid;
      gap: 8px;
    }

    .job {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px;
      background: #fff;
    }

    .job-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .job-id {
      font-size: 12px;
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    .progress {
      height: 8px;
      background: var(--surface-2);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .progress > span {
      display: block;
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 180ms ease;
    }

    .job-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
    }

    .files {
      margin-top: 8px;
      display: grid;
      gap: 5px;
    }

    .file {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      padding: 6px 7px;
      background: var(--surface-2);
      border-radius: 5px;
      font-size: 12px;
    }

    .empty {
      color: var(--muted);
      font-size: 13px;
      padding: 12px;
      background: var(--surface-2);
      border-radius: 6px;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
      overflow-wrap: anywhere;
    }

    .toast {
      position: fixed;
      right: 12px;
      bottom: 12px;
      max-width: min(460px, calc(100vw - 24px));
      padding: 10px 12px;
      border-radius: 7px;
      background: #1d252d;
      color: #fff;
      box-shadow: 0 8px 24px rgba(16, 24, 40, 0.18);
      display: none;
      z-index: 20;
      overflow-wrap: anywhere;
    }

    .toast.err { background: var(--danger); }

    @media (max-width: 820px) {
      .app { grid-template-columns: 1fr; }
      .url-row { grid-template-columns: 1fr; }
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .summary { grid-template-columns: 1fr; }
      .thumb { width: 100%; max-width: 240px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="column">
      <div class="panel">
        <div class="panel-header">
          <h1 class="panel-title">yt-dlp 다운로드</h1>
          <span id="ready-badge" class="badge">대기 중</span>
        </div>
        <div class="panel-body">
          <div class="url-row">
            <label>
              URL
              <input id="url" type="url" placeholder="https://media.w3.org/2010/05/sintel/trailer.mp4" required>
            </label>
            <button id="analyze" class="btn" type="button">분석</button>
            <button id="dry-run" class="btn" type="button">미리 보기</button>
            <button id="download" class="btn primary" type="button">지금 실행</button>
          </div>

          <div class="advanced">
            <div class="preset-row">
              <label>
                사용자 프리셋
                <select id="preset">
                  <option value="">직접 설정</option>
                </select>
              </label>
              <button id="save-preset" class="btn" type="button">프리셋 저장</button>
              <button id="delete-preset" class="btn danger" type="button">삭제</button>
            </div>
            <div class="grid-3">
              <label>
                Collection
                <select id="collection">
                  <option value="plex">Plex 라이브러리</option>
                  <option value="shorts">쇼츠 원본</option>
                  <option value="custom" selected>사용자 지정</option>
                </select>
                <div class="hint">현재는 저장 분류이며, 향후 플러그인 간 계약 키로 사용할 수 있습니다.</div>
              </label>
              <label>
                저장 하위 경로
                <input id="relative-path" type="text" value="yt_dlp_downloader">
              </label>
              <label>
                중복 방지
                <select id="archive-mode">
                  <option value="disabled">사용 안 함</option>
                  <option value="auto" selected>자동</option>
                  <option value="custom">직접 지정</option>
                </select>
              </label>
              <label>
                화질
                <select id="format-preset">
                  <option value="best">최고 품질</option>
                  <option value="1080p">1080p</option>
                  <option value="720p">720p</option>
                  <option value="480p">480p</option>
                  <option value="audio">오디오 원본</option>
                  <option value="custom">직접 지정</option>
                </select>
              </label>
              <label>
                모드
                <select id="download-mode">
                  <option value="video">영상</option>
                  <option value="audio">오디오</option>
                </select>
              </label>
              <label>
                제한 시간
                <input id="timeout" type="number" min="1" max="3600" value="1800">
              </label>
              <label>
                스케줄 Cron
                <input id="schedule-cron" type="text" placeholder="*/30 * * * *">
              </label>
            </div>
            <details>
              <summary>고급 옵션</summary>
              <div class="grid-2">
                <label>
                  파일명 템플릿 프리셋
                  <select id="template-preset">
                    <option value="plex">Plex YouTube Agent</option>
                    <option value="playlist">재생목록 보관</option>
                    <option value="channel">채널 보관</option>
                    <option value="flat">단일 폴더</option>
                    <option value="custom">직접 입력</option>
                  </select>
                  <div class="hint">Plex용은 영상 ID, 채널 ID를 파일/폴더명에 포함합니다.</div>
                </label>
                <label>
                  파일명 템플릿
                  <input id="output-template" type="text" value="%(uploader)s [%(channel_id)s]/%(playlist_index)s - %(title).200B [%(id)s].%(ext)s">
                  <div class="hint">주요 변수: %(id)s, %(channel_id)s, %(playlist_id)s, %(playlist_index)s, %(uploader)s, %(upload_date)s, %(title)s, %(ext)s</div>
                </label>
                <label>
                  Archive ID
                  <input id="archive-id" type="text" placeholder="custom archive id">
                </label>
                <label>
                  사용자 포맷 선택자
                  <input id="format-selector" type="text" placeholder="bestvideo[height&lt;=720]+bestaudio/best">
                </label>
                <label>
                  메타데이터 항목 수
                  <input id="metadata-limit" type="number" min="1" max="100" value="50">
                </label>
              </div>
            </details>
            <div style="margin-top:10px">
              <button id="create-schedule" class="btn" type="button">스케줄 만들기</button>
            </div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2 class="panel-title">분석 결과</h2>
          <span id="metadata-badge" class="badge">분석 전</span>
        </div>
        <div id="metadata" class="panel-body">
          <div class="empty">아직 분석 결과가 없습니다.</div>
        </div>
      </div>

      <div class="panel" id="entries-panel" style="display:none">
        <div class="panel-header">
          <h2 class="panel-title">항목</h2>
          <div>
            <button id="select-all" class="btn small" type="button">전체</button>
            <button id="select-none" class="btn small" type="button">해제</button>
          </div>
        </div>
        <div class="panel-body">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th class="check-col"></th>
                  <th class="idx-col">번호</th>
                  <th>제목</th>
                  <th class="dur-col">길이</th>
                </tr>
              </thead>
              <tbody id="entries"></tbody>
            </table>
          </div>
        </div>
      </div>
    </section>

    <aside class="column">
      <div class="panel">
        <div class="panel-header">
          <h2 class="panel-title">실행 중</h2>
          <button id="refresh-jobs" class="btn small" type="button">새로고침</button>
        </div>
        <div class="panel-body">
          <div id="active-jobs" class="job-list">
            <div class="empty">실행 중인 작업이 없습니다.</div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2 class="panel-title">최근 결과</h2>
          <span id="recent-count" class="badge">0</span>
        </div>
        <div class="panel-body">
          <div id="recent-jobs" class="job-list">
            <div class="empty">최근 결과가 없습니다.</div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2 class="panel-title">스케줄</h2>
          <button id="refresh-schedules" class="btn small" type="button">새로고침</button>
        </div>
        <div class="panel-body">
          <div id="schedules" class="job-list">
            <div class="empty">등록된 스케줄이 없습니다.</div>
          </div>
        </div>
      </div>
    </aside>
  </main>
  <div id="toast" class="toast"></div>

  <script>
    (() => {
      const plugin = "yt_dlp_downloader";
      const presetStorageKey = "hanis.yt_dlp_downloader.presets.v1";
      const state = {
        metadata: null,
        entries: [],
        watchedJobs: new Set(),
        pollTimer: null
      };
      const outputTemplates = {
        plex: "%(uploader)s [%(channel_id)s]/%(playlist_index)s - %(title).200B [%(id)s].%(ext)s",
        playlist: "%(uploader)s [%(channel_id)s]/%(playlist)s [%(playlist_id)s]/%(playlist_index)s - %(title).200B [%(id)s].%(ext)s",
        channel: "%(uploader)s [%(channel_id)s]/%(upload_date)s - %(title).200B [%(id)s].%(ext)s",
        flat: "%(title).200B [%(id)s].%(ext)s"
      };

      const $ = (id) => document.getElementById(id);

      function toast(message, isError = false) {
        const el = $("toast");
        el.textContent = message;
        el.className = `toast${isError ? " err" : ""}`;
        el.style.display = "block";
        clearTimeout(el._timer);
        el._timer = setTimeout(() => { el.style.display = "none"; }, 3800);
      }

      async function api(path, options = {}) {
        const res = await fetch(path, {
          credentials: "include",
          headers: { "Content-Type": "application/json", ...(options.headers || {}) },
          ...options
        });
        const text = await res.text();
        const data = text ? JSON.parse(text) : {};
        if (!res.ok) {
          throw new Error(data.detail || data.error || `${res.status} ${res.statusText}`);
        }
        return data;
      }

      function formatDuration(value) {
        if (value === null || value === undefined || value === "") return "-";
        const total = Number(value);
        if (!Number.isFinite(total)) return String(value);
        const h = Math.floor(total / 3600);
        const m = Math.floor((total % 3600) / 60);
        const s = Math.floor(total % 60);
        return h ? `${h}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}` : `${m}:${String(s).padStart(2, "0")}`;
      }

      function formatBytes(value) {
        const n = Number(value || 0);
        if (!n) return "0 B";
        const units = ["B", "KB", "MB", "GB", "TB"];
        let size = n;
        let unit = 0;
        while (size >= 1024 && unit < units.length - 1) {
          size /= 1024;
          unit += 1;
        }
        return `${size.toFixed(size >= 10 || unit === 0 ? 0 : 1)} ${units[unit]}`;
      }

      function statusBadge(status) {
        const label = {
          completed: "완료",
          success: "성공",
          pending: "대기",
          running: "실행 중",
          quarantine: "격리",
          failed: "실패",
          canceled: "취소",
          partial: "일부 완료",
          no_new_items: "새 항목 없음",
          preview: "미리 보기",
          enabled: "사용",
          disabled: "중지"
        }[status] || status || "알 수 없음";
        const cls = status === "completed" || status === "success" ? "ok" :
          status === "quarantine" || status === "failed" ? "err" :
          status === "canceled" || status === "partial" || status === "no_new_items" ? "warn" : "";
        return `<span class="badge ${cls}">${escapeHtml(label)}</span>`;
      }

      function reasonLabel(reason) {
        return {
          already_in_archive: "이미 archive에 있음",
          file_exists: "파일이 이미 있음",
          private_video: "비공개 영상",
          unavailable: "사용할 수 없는 영상",
          live_not_ready: "라이브 대기 중",
          members_only: "멤버십 전용"
        }[reason] || reason || "건너뜀";
      }

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, (ch) => ({
          "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;"
        }[ch]));
      }

      function loadPresets() {
        try {
          const raw = localStorage.getItem(presetStorageKey);
          const data = raw ? JSON.parse(raw) : [];
          return Array.isArray(data) ? data.filter((item) => item && typeof item.name === "string") : [];
        } catch {
          return [];
        }
      }

      function savePresets(presets) {
        localStorage.setItem(presetStorageKey, JSON.stringify(presets));
      }

      function renderPresets(selectedName = "") {
        const presets = loadPresets().sort((a, b) => a.name.localeCompare(b.name));
        $("preset").innerHTML = '<option value="">직접 설정</option>' + presets.map((preset) =>
          `<option value="${escapeHtml(preset.name)}">${escapeHtml(preset.name)}</option>`
        ).join("");
        $("preset").value = selectedName;
      }

      function applyPreset(preset) {
        if (!preset) return;
        $("collection").value = preset.collection || "custom";
        $("relative-path").value = preset.relative_path || "yt_dlp_downloader";
        $("format-preset").value = preset.format_preset || "best";
        $("download-mode").value = preset.download_mode || "video";
        $("archive-mode").value = preset.archive_mode || "auto";
        $("output-template").value = preset.output_template || outputTemplates.plex;
        $("format-selector").value = preset.format_selector || "";
      }

      function currentPresetData(name) {
        return {
          name,
          collection: $("collection").value,
          relative_path: $("relative-path").value.trim(),
          format_preset: $("format-preset").value,
          download_mode: $("download-mode").value,
          archive_mode: $("archive-mode").value,
          output_template: $("output-template").value.trim(),
          format_selector: $("format-selector").value.trim()
        };
      }

      function saveCurrentPreset() {
        const existingName = $("preset").value;
        const typedName = prompt("프리셋 이름", existingName || "");
        const name = (typedName || "").trim();
        if (!name) return;
        const presets = loadPresets().filter((preset) => preset.name !== name);
        presets.push(currentPresetData(name));
        savePresets(presets);
        renderPresets(name);
        toast(`프리셋 저장됨: ${name}`);
      }

      function deleteCurrentPreset() {
        const name = $("preset").value;
        if (!name) return toast("삭제할 프리셋을 먼저 선택하세요.", true);
        const presets = loadPresets().filter((preset) => preset.name !== name);
        savePresets(presets);
        renderPresets("");
        toast(`프리셋 삭제됨: ${name}`);
      }

      function payloadBase() {
        const preset = $("format-preset").value;
        const mode = $("download-mode").value;
        const payload = {
          url: $("url").value.trim(),
          collection: $("collection").value,
          relative_path: $("relative-path").value.trim(),
          output_template: $("output-template").value.trim(),
          timeout: Number($("timeout").value || 1800),
          format_preset: preset,
          download_mode: mode,
          archive_mode: $("archive-mode").value,
          allow_playlist: false
        };
        const archiveId = $("archive-id").value.trim();
        if (payload.archive_mode === "custom") payload.archive_id = archiveId;
        const custom = $("format-selector").value.trim();
        if (preset === "custom") payload.format_selector = custom;
        if (mode === "audio") payload.audio_format = "source";
        return payload;
      }

      async function createJob(payload) {
        return api("/jobs", {
          method: "POST",
          body: JSON.stringify({ plugin, payload })
        });
      }

      async function waitForJob(jobId, onUpdate) {
        const terminal = new Set(["completed", "success", "quarantine", "failed", "canceled"]);
        const started = Date.now();
        for (;;) {
          let job = null;
          try {
            job = await api(`/jobs/${jobId}`);
          } catch (error) {
            const transientWindow = Date.now() - started < 12000;
            if (!transientWindow) throw error;
            const jobs = await loadPluginJobs().catch(() => []);
            job = jobs.find((item) => item.id === jobId) || null;
            if (!job) {
              await new Promise((resolve) => setTimeout(resolve, 1000));
              continue;
            }
          }
          onUpdate?.(job);
          if (terminal.has(job.status)) return job;
          await new Promise((resolve) => setTimeout(resolve, 1200));
        }
      }

      function renderMetadata(metadata) {
        const root = $("metadata");
        if (!metadata) {
          root.innerHTML = '<div class="empty">아직 분석 결과가 없습니다.</div>';
          $("metadata-badge").textContent = "분석 전";
          return;
        }
        $("metadata-badge").textContent = metadata.kind || "metadata";
        const thumb = metadata.thumbnail
          ? `<img class="thumb" src="${escapeHtml(metadata.thumbnail)}" alt="">`
          : '<div class="thumb placeholder">No image</div>';
        root.innerHTML = `
          <div class="summary">
            ${thumb}
            <div>
              <h3 class="title">${escapeHtml(metadata.title || metadata.webpage_url || "제목 없음")}</h3>
              <div class="meta">
                <span class="badge">${escapeHtml(metadata.kind || "unknown")}</span>
                <span>${escapeHtml(metadata.extractor || "-")}</span>
                <span>${formatDuration(metadata.duration)}</span>
                ${metadata.uploader ? `<span>${escapeHtml(metadata.uploader)}</span>` : ""}
                ${metadata.entries_count ? `<span>${metadata.entries_count}개 항목</span>` : ""}
                ${metadata.entries_truncated ? '<span class="badge warn">일부만 표시</span>' : ""}
              </div>
            </div>
          </div>
        `;
      }

      function renderEntries(entries) {
        state.entries = Array.isArray(entries) ? entries : [];
        const panel = $("entries-panel");
        const body = $("entries");
        if (!state.entries.length) {
          panel.style.display = "none";
          body.innerHTML = "";
          return;
        }
        panel.style.display = "block";
        body.innerHTML = state.entries.map((entry) => `
          <tr>
            <td class="check-col"><input type="checkbox" class="entry-check" value="${entry.index}" checked></td>
            <td class="idx-col">${entry.index}</td>
            <td>${escapeHtml(entry.title || entry.id || `Item ${entry.index}`)}</td>
            <td class="dur-col">${formatDuration(entry.duration)}</td>
          </tr>
        `).join("");
      }

      function selectedEntries() {
        return Array.from(document.querySelectorAll(".entry-check:checked"))
          .map((input) => Number(input.value))
          .filter((value) => Number.isInteger(value) && value > 0);
      }

      async function analyze() {
        const payload = payloadBase();
        if (!payload.url) return toast("URL을 입력하세요.", true);
        payload.metadata_only = true;
        payload.metadata_limit = Number($("metadata-limit").value || 50);
        $("analyze").disabled = true;
        $("ready-badge").textContent = "분석 중";
        try {
          const created = await createJob(payload);
          state.watchedJobs.add(created.job_id);
          renderJobs();
          const job = await waitForJob(created.job_id, renderJobs);
          if (job.status !== "completed" && job.status !== "success") {
            throw new Error(`분석 작업 상태: ${job.status}`);
          }
          const metadata = job.result?.metadata;
          state.metadata = metadata || null;
          renderMetadata(state.metadata);
          renderEntries(state.metadata?.entries || []);
          toast("분석 결과를 불러왔습니다.");
        } catch (error) {
          toast(error.message, true);
        } finally {
          $("analyze").disabled = false;
          $("ready-badge").textContent = "대기 중";
          renderJobs();
        }
      }

      async function download() {
        const payload = payloadBase();
        if (!payload.url) return toast("URL을 입력하세요.", true);
        const entries = selectedEntries();
        if (entries.length) {
          payload.allow_playlist = true;
          payload.selected_entries = entries;
        }
        $("download").disabled = true;
        try {
          const created = await createJob(payload);
          state.watchedJobs.add(created.job_id);
          toast(`작업 생성됨: ${created.job_id}`);
          renderJobs();
        } catch (error) {
          toast(error.message, true);
        } finally {
          $("download").disabled = false;
        }
      }

      async function dryRun() {
        const payload = payloadBase();
        if (!payload.url) return toast("URL을 입력하세요.", true);
        payload.dry_run = true;
        payload.metadata_limit = Number($("metadata-limit").value || 50);
        const entries = selectedEntries();
        if (entries.length) {
          payload.allow_playlist = true;
          payload.selected_entries = entries;
        }
        $("dry-run").disabled = true;
        try {
          const created = await createJob(payload);
          state.watchedJobs.add(created.job_id);
          const job = await waitForJob(created.job_id, renderJobs);
          if (job.status !== "completed" && job.status !== "success") throw new Error(`미리 보기 작업 상태: ${job.status}`);
          const result = job.result || {};
          toast(`미리 보기: 다운로드 ${result.will_download?.length || 0}개, 건너뜀 ${result.will_skip?.length || 0}개`);
          renderJobs();
        } catch (error) {
          toast(error.message, true);
        } finally {
          $("dry-run").disabled = false;
        }
      }

      async function createSchedule() {
        const cron = $("schedule-cron").value.trim();
        const payload = payloadBase();
        if (!payload.url) return toast("URL을 입력하세요.", true);
        if (!cron) return toast("스케줄 Cron을 입력하세요.", true);
        const id = `ytdlp_${payload.collection}_${Date.now()}`;
        payload.allow_playlist = true;
        payload.schedule_id = id;
        try {
          await api("/admin/schedules", {
            method: "POST",
            body: JSON.stringify({ id, plugin, cron, enabled: true, payload })
          });
          toast(`스케줄 생성됨: ${id}`);
          renderSchedules();
        } catch (error) {
          toast(error.message, true);
        }
      }

      async function cancelJob(jobId) {
        try {
          await api(`/jobs/${jobId}/cancel`, { method: "POST", body: "{}" });
          toast(`취소 요청됨: ${jobId}`);
          renderJobs();
        } catch (error) {
          toast(error.message, true);
        }
      }

      async function loadPluginJobs() {
        const jobs = await api("/jobs");
        return jobs
          .filter((job) => job.plugin === plugin)
          .sort((a, b) => (b.created_at || 0) - (a.created_at || 0));
      }

      async function renderSchedules() {
        try {
          const schedules = await api("/admin/schedules");
          const mine = schedules.filter((schedule) => schedule.plugin === plugin);
          $("schedules").innerHTML = mine.length ? mine.map((schedule) => `
            <div class="job">
              <div class="job-head">
                ${statusBadge(schedule.enabled === false ? "disabled" : "enabled")}
                <button class="btn small" data-toggle-schedule="${escapeHtml(schedule.id)}" data-enabled="${schedule.enabled === false ? "true" : "false"}" type="button">${schedule.enabled === false ? "사용" : "중지"}</button>
              </div>
              <div class="job-id">${escapeHtml(schedule.id)}</div>
              <div class="job-meta">
                <span>${escapeHtml(schedule.cron || "-")}</span>
                <span>${escapeHtml(schedule.payload?.collection || "custom")}</span>
                <span>${escapeHtml(schedule.payload?.relative_path || "")}</span>
              </div>
            </div>
          `).join("") : '<div class="empty">등록된 스케줄이 없습니다.</div>';
          document.querySelectorAll("[data-toggle-schedule]").forEach((button) => {
            button.addEventListener("click", async () => {
              await api(`/admin/schedules/${button.dataset.toggleSchedule}`, {
                method: "PATCH",
                body: JSON.stringify({ enabled: button.dataset.enabled === "true" })
              });
              renderSchedules();
            });
          });
        } catch (error) {
          $("schedules").innerHTML = `<div class="empty">${escapeHtml(error.message)}</div>`;
        }
      }

      function jobPercent(job) {
        const progress = job.progress || {};
        if (typeof progress.percent === "number") return Math.max(0, Math.min(100, progress.percent));
        if (job.status === "completed" || job.status === "success") return 100;
        return 0;
      }

      function renderJob(job, compact = false) {
        const progress = job.progress || {};
        const percent = jobPercent(job);
        const files = job.result?.files || [];
        const willDownload = job.result?.will_download || [];
        const willSkip = job.result?.will_skip || [];
        const skipped = job.result?.skipped || [];
        const resultStatus = job.result?.status;
        const canCancel = job.status === "pending" || job.status === "running";
        return `
          <div class="job">
            <div class="job-head">
              ${statusBadge(resultStatus || job.status)}
              ${canCancel ? `<button class="btn danger small" data-cancel="${escapeHtml(job.id)}" type="button">취소</button>` : ""}
            </div>
            <div class="job-id">${escapeHtml(job.id)}</div>
            ${compact ? "" : `<div class="progress" aria-label="progress"><span style="width:${percent}%"></span></div>`}
            <div class="job-meta">
              <span>${percent.toFixed(percent % 1 ? 1 : 0)}%</span>
              ${progress.speed ? `<span>${escapeHtml(progress.speed)}</span>` : ""}
              ${progress.eta ? `<span>남은 시간 ${escapeHtml(progress.eta)}</span>` : ""}
              ${job.result?.mode ? `<span>${escapeHtml(job.result.mode)}</span>` : ""}
              ${job.result?.format_preset ? `<span>${escapeHtml(job.result.format_preset)}</span>` : ""}
              ${Number.isInteger(job.result?.downloaded_count) ? `<span>다운로드 ${job.result.downloaded_count}개</span>` : ""}
              ${Number.isInteger(job.result?.skipped_count) ? `<span>건너뜀 ${job.result.skipped_count}개</span>` : ""}
            </div>
            ${files.length ? `<div class="files">${files.map((file) => `
              <div class="file">
                <span>${escapeHtml(file.title || file.path)}</span>
                <span>${escapeHtml(file.ext || "")} ${formatBytes(file.size)}</span>
              </div>
            `).join("")}</div>` : ""}
            ${willDownload.length ? `<div class="files">${willDownload.slice(0, 8).map((item) => `
              <div class="file">
                <span>받을 예정: ${escapeHtml(item.title || item.id || "-")}</span>
                <span>${escapeHtml(item.id || "")}</span>
              </div>
            `).join("")}</div>` : ""}
            ${willSkip.length ? `<div class="files">${willSkip.slice(0, 8).map((item) => `
              <div class="file">
                <span>건너뜀: ${escapeHtml(item.title || item.id || "-")}</span>
                <span>${escapeHtml(reasonLabel(item.reason))}</span>
              </div>
            `).join("")}</div>` : ""}
            ${skipped.length ? `<div class="files">${skipped.slice(0, 8).map((item) => `
              <div class="file">
                <span>건너뜀: ${escapeHtml(item.title || item.id || "-")}</span>
                <span>${escapeHtml(reasonLabel(item.reason))}</span>
              </div>
            `).join("")}</div>` : ""}
          </div>
        `;
      }

      async function renderJobs() {
        try {
          const jobs = await loadPluginJobs();
          const active = jobs.filter((job) => job.status === "pending" || job.status === "running");
          const recent = jobs.filter((job) => !active.includes(job)).slice(0, 8);
          $("active-jobs").innerHTML = active.length
            ? active.map((job) => renderJob(job)).join("")
            : '<div class="empty">실행 중인 작업이 없습니다.</div>';
          $("recent-jobs").innerHTML = recent.length
            ? recent.map((job) => renderJob(job, true)).join("")
            : '<div class="empty">최근 결과가 없습니다.</div>';
          $("recent-count").textContent = String(recent.length);
          document.querySelectorAll("[data-cancel]").forEach((button) => {
            button.addEventListener("click", () => cancelJob(button.dataset.cancel));
          });
        } catch (error) {
          $("active-jobs").innerHTML = `<div class="empty">${escapeHtml(error.message)}</div>`;
        }
      }

      $("analyze").addEventListener("click", analyze);
      $("dry-run").addEventListener("click", dryRun);
      $("download").addEventListener("click", download);
      $("create-schedule").addEventListener("click", createSchedule);
      $("refresh-jobs").addEventListener("click", renderJobs);
      $("refresh-schedules").addEventListener("click", renderSchedules);
      $("preset").addEventListener("change", () => {
        const name = $("preset").value;
        if (!name) return;
        const preset = loadPresets().find((item) => item.name === name);
        applyPreset(preset);
      });
      $("save-preset").addEventListener("click", saveCurrentPreset);
      $("delete-preset").addEventListener("click", deleteCurrentPreset);
      $("select-all").addEventListener("click", () => {
        document.querySelectorAll(".entry-check").forEach((input) => { input.checked = true; });
      });
      $("select-none").addEventListener("click", () => {
        document.querySelectorAll(".entry-check").forEach((input) => { input.checked = false; });
      });
      $("format-preset").addEventListener("change", () => {
        const preset = $("format-preset").value;
        if (preset === "audio") $("download-mode").value = "audio";
      });
      $("download-mode").addEventListener("change", () => {
        if ($("download-mode").value === "audio" && $("format-preset").value === "best") {
          $("format-preset").value = "audio";
        }
      });
      $("template-preset").addEventListener("change", () => {
        const preset = $("template-preset").value;
        if (preset !== "custom" && outputTemplates[preset]) {
          $("output-template").value = outputTemplates[preset];
        }
      });
      $("output-template").addEventListener("input", () => {
        $("template-preset").value = "custom";
      });
      $("collection").addEventListener("change", () => {
        const value = $("collection").value;
        if (value === "plex") {
          $("relative-path").value = "youtube";
          $("format-preset").value = "best";
          $("archive-mode").value = "auto";
          $("template-preset").value = "plex";
          $("output-template").value = outputTemplates.plex;
        } else if (value === "shorts") {
          $("relative-path").value = "raw";
          $("format-preset").value = "1080p";
          $("archive-mode").value = "auto";
          $("template-preset").value = "channel";
          $("output-template").value = outputTemplates.channel;
        } else {
          $("relative-path").value = "yt_dlp_downloader";
        }
      });

      renderPresets();
      renderJobs();
      renderSchedules();
      state.pollTimer = setInterval(renderJobs, 2500);
      window.addEventListener("beforeunload", () => clearInterval(state.pollTimer));
    })();
  </script>
</body>
</html>
