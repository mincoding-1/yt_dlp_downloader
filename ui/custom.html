<form id="yt-dlp-form" style="display:grid;gap:10px;max-width:720px;padding:12px">
  <label>
    URL
    <input name="url" type="url" required placeholder="https://media.w3.org/2010/05/sintel/trailer.mp4" style="width:100%">
  </label>
  <label>
    Output directory
    <input name="output_path" type="text" value="/var/lib/hanis/downloads/yt_dlp_downloader" style="width:100%">
  </label>
  <label>
    Filename template
    <input name="output_template" type="text" value="%(title).200B [%(id)s].%(ext)s" style="width:100%">
  </label>
  <label>
    Timeout seconds
    <input name="timeout" type="number" min="1" max="3600" value="1800" style="width:120px">
  </label>
  <label>
    <input name="metadata_only" type="checkbox">
    Metadata only
  </label>
  <label>
    <input name="allow_playlist" type="checkbox">
    Allow playlist
  </label>
  <button type="submit">Run</button>
</form>
<pre id="yt-dlp-result" style="margin:0 12px 12px;padding:10px;background:#f7f7f7;border:1px solid #ddd;white-space:pre-wrap"></pre>

<script>
(() => {
  const form = document.getElementById("yt-dlp-form");
  const result = document.getElementById("yt-dlp-result");
  const pending = new Map();

  window.addEventListener("message", (event) => {
    if (event.origin !== window.location.origin) return;
    const data = event.data || {};
    if (!data.request_id || !pending.has(data.request_id)) return;
    pending.delete(data.request_id);
    result.textContent = JSON.stringify(data, null, 2);
  });

  form.addEventListener("submit", (event) => {
    event.preventDefault();
    const data = new FormData(form);
    const request_id = `yt_dlp_${Date.now()}_${Math.random().toString(16).slice(2)}`;
    const payload = {
      url: String(data.get("url") || "").trim(),
      output_path: String(data.get("output_path") || "").trim(),
      output_template: String(data.get("output_template") || "").trim(),
      timeout: Number(data.get("timeout") || 1800),
      metadata_only: data.get("metadata_only") === "on",
      allow_playlist: data.get("allow_playlist") === "on"
    };
    pending.set(request_id, true);
    result.textContent = "Requesting job...";
    window.parent.postMessage({
      source: "plugin",
      event: "HANIS_RUN_PLUGIN",
      request_id,
      plugin: "yt_dlp_downloader",
      payload
    }, window.location.origin);
  });
})();
</script>
